# Module 13 - Docker Compose Exercise
# Runs account and loan microservices together on a shared custom network
# Demonstrates: multi-container orchestration, custom networking, port mapping

version: '3.8'

services:

  account-service:
    build:
      context: ./account
    container_name: account-service
    ports:
      - "8080:8080"     # host:container - reachable at localhost:8080
    networks:
      - bank-network

  loan-service:
    build:
      context: ./loan
    container_name: loan-service
    ports:
      - "8081:8081"
    networks:
      - bank-network
    depends_on:
      - account-service   # loan starts after account (doesn't wait for it to be "ready", just "started")

networks:
  # custom bridge network - lets both containers resolve each other
  # by container name (e.g. account-service could call http://account-service:8080)
  bank-network:
    driver: bridge
