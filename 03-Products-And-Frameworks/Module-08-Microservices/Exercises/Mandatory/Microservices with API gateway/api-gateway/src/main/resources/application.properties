spring.application.name=api-gateway

# api gateway runs on port 9090
server.port=9090

# tells this service where to find the eureka discovery server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# enables the gateway to automatically create routes based on services
# registered in eureka (so you don't have to hand-write a route per service)
spring.cloud.gateway.discovery.locator.enabled=true

# Hands-on step 20: use lower-case service id in the route path
# without this, the URL would need to be /GREET-SERVICE/greet (uppercase)
# with this, you can call it as /greet-service/greet (lowercase)
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
